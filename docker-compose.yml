services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apli-mail-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - apli_storage:/var/www/html/storage/app
      - apli_public_build:/var/www/html/public/build
    networks:
      - apli

  nginx:
    image: nginx:1.27-alpine
    container_name: apli-mail-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - apli_storage:/var/www/html/storage/app
      - apli_public_build:/var/www/html/public/build:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - apli

  postgres:
    image: postgres:16-alpine
    container_name: apli-mail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-apli_mail}
      POSTGRES_USER: ${DB_USERNAME:-apli}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apli_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apli

  redis:
    image: redis:7-alpine
    container_name: apli-mail-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - apli

volumes:
  postgres_data:
  redis_data:
  apli_storage:
  apli_public_build:

networks:
  apli:
    driver: bridge
